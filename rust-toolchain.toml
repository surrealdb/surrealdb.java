# This toolchain should be aligned with the Rust toolchain the matching
# SurrealDB version is built with — currently 1.95 for SurrealDB 3.1.x.
# Don't add a patch number to the channel (e.g. "1.95.1") — only the minor
# version, otherwise rust-analyzer and other tooling break.
[toolchain]
channel = "1.95"
components = ["rustfmt", "clippy"]
