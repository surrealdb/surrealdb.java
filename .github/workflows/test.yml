name: Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        java: [ '8', '11', '17', '21', '22' ]

    steps:
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: clippy,rustfmt

      - uses: actions/checkout@v4

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Install dependencies
        run: sudo apt-get update

      - name: Set up JDK 17 (Gradle runner)
        id: java17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up JDK ${{ matrix.java }} (toolchain)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ matrix.java }}

      - name: Build native lib
        env:
          RUSTFLAGS: '--cfg surrealdb_unstable'
        run: cargo build

      - name: Start SurrealDB
        uses: surrealdb/setup-surreal@v2
        with:
          surrealdb_version: v3.0.0-beta.3
          surrealdb_port: 8000
          surrealdb_auth: false
          surrealdb_strict: false
          surrealdb_log: info
          surrealdb_additional_args: --allow-all
          surrealdb_retry_count: 30

      - name: Test
        env:
          JAVA_HOME: ${{ steps.java17.outputs.path }}
        run: |
          chmod +x gradlew
          ./gradlew -i test jacocoTestReport -PjavaToolchainVersion=${{ matrix.java }}
